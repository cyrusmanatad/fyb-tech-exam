version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel-backend
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    command: php artisan serve --host=127.0.0.1 --port=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vue-frontend
    volumes:
      - ./frontend:/app
    ports:
      - "3001:5173"
    command: npm run dev -- --host
