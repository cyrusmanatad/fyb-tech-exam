version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fyb-frontend
    restart: unless-stopped
    networks:
      - fyb-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fyb-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    networks:
      - fyb-network
    depends_on:
      - frontend

  nginx:
    image: nginx:alpine
    container_name: fyb-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/var/www/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - fyb-network
    depends_on:
      - frontend
      - backend

networks:
  fyb-network:
    driver: bridge
